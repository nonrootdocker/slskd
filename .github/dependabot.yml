version: 2

updates:
  # Nix flake inputs (nixpkgs, minimalbase, etc.)
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "nixpkgs"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
