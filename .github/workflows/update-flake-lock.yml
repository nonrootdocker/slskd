name: Update flake.lock

on:
  schedule:
    - cron: '0 0 */3 * *'   # every 3 days
  workflow_dispatch:

permissions:
  contents: read   # this job acts via the App token, not GITHUB_TOKEN

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      # slskd itself comes from nixpkgs (pkgs.slskd), so bumping nixpkgs is
      # what advances slskd to the latest packaged release. nixpkgs maintains
      # the .NET build + bundled frontend for us.
      - name: Update nixpkgs and open PR
        uses: DeterminateSystems/update-flake-lock@v28
        with:
          inputs: nixpkgs
          token: ${{ steps.app-token.outputs.token }}
          pr-title: "Update nixpkgs to advance slskd"
          pr-labels: |
            automated
